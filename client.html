<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #2ecc71; --gold: #f1c40f; --bg: #0f1216; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; }
        .app-container { padding: 20px; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        
        /* Glassmorphism Card */
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; width: 100%; padding: 20px; box-sizing: border-box; }
        
        .header { display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 30px; }
        .rank-badge { background: var(--gold); color: black; padding: 6px 16px; border-radius: 50px; font-weight: 800; font-size: 14px; text-transform: uppercase; }
        .qr-btn { background: rgba(255,255,255,0.1); border: none; width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        .progress-section { width: 100%; margin-bottom: 40px; }
        .bar-bg { background: rgba(255,255,255,0.1); height: 8px; border-radius: 10px; margin-bottom: 8px; }
        .bar-fill { background: linear-gradient(90deg, #f1c40f, #f39c12); height: 100%; border-radius: 10px; transition: width 1s ease; }
        
        .balance-label { color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 5px; }
        .balance-value { font-size: 72px; font-weight: 800; letter-spacing: -2px; text-shadow: 0 0 30px rgba(46, 204, 113, 0.3); color: var(--accent); }
        
        #qrModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #qrcode { background: white; padding: 20px; border-radius: 20px; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div id="rankBadge" class="rank-badge">BRONZE</div>
            <button class="qr-btn" onclick="openQR()">📷</button>
        </div>

        <div class="progress-section">
            <div class="bar-bg"><div id="barFill" class="bar-fill" style="width: 0%"></div></div>
            <div id="nextRankText" style="font-size: 12px; color: rgba(255,255,255,0.5)">Загрузка...</div>
        </div>

        <div class="balance-label">Доступные бонусы</div>
        <div class="balance-value" id="balanceVal">0</div>
        
        <div style="margin-top: auto; color: rgba(255,255,255,0.3); font-size: 12px; padding-bottom: 20px;">
            Дата сгорания: <span id="expireDate">не запланировано</span>
        </div>
    </div>

    <div id="qrModal" onclick="closeQR()">
        <div id="qrcode"></div>
        <div style="font-weight: bold;">ВАШ ID: <span id="idDisplay">000000</span></div>
        <p style="opacity: 0.5;">Нажмите в любое место, чтобы закрыть</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = '#0f1216';
        tg.headerColor = '#0f1216';

        const p = new URLSearchParams(window.location.search);
        const bonuses = p.get('bonuses') || '0';
        const spent = parseFloat(p.get('spent') || '0');
        const cid = p.get('cid') || '000000';
        const rank = p.get('rank') || 'BRONZE';

        document.getElementById('balanceVal').innerText = Math.floor(bonuses);
        document.getElementById('idDisplay').innerText = cid;
        document.getElementById('rankBadge').innerText = rank;

        // Пороги: 400к, 800к, 1.2м
        let next = 400000;
        if (spent >= 1200000) next = 1200000;
        else if (spent >= 800000) next = 1200000;
        else if (spent >= 400000) next = 800000;

        const progress = Math.min((spent / next) * 100, 100);
        document.getElementById('barFill').style.width = progress + '%';
        document.getElementById('nextRankText').innerText = `До следующего уровня: ${Math.max(0, next - spent).toLocaleString()} тг`;

        new QRCode(document.getElementById("qrcode"), { text: cid, width: 200, height: 200 });
        function openQR() { document.getElementById('qrModal').style.display = 'flex'; }
        function closeQR() { document.getElementById('qrModal').style.display = 'none'; }
    </script>
</body>
</html>
</html>
