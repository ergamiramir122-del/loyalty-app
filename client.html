<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мой профиль</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #2ecc71; --gold: #f1c40f; --bg: #0f1216; --glass: rgba(255, 255, 255, 0.07); }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 25px; margin-bottom: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .rank-badge { background: var(--gold); color: black; padding: 6px 16px; border-radius: 50px; font-weight: 800; font-size: 12px; text-transform: uppercase; }
        .balance-val { font-size: 64px; font-weight: 800; color: var(--accent); margin: 10px 0; text-shadow: 0 0 20px rgba(46, 204, 113, 0.2); }
        .progress-bar { background: rgba(255,255,255,0.1); height: 6px; border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .fill { background: var(--gold); height: 100%; transition: width 1s; }
        .btn-main { background: var(--accent); color: black; border: none; width: 100%; padding: 18px; border-radius: 18px; font-size: 18px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        
        #qrModal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #qrcode { background: white; padding: 15px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <div id="rank" class="rank-badge">BRONZE</div>
        <div style="opacity: 0.5; font-size: 14px;" id="fio_display">Загрузка...</div>
    </div>

    <div class="card">
        <div style="opacity: 0.6; font-size: 14px;">Доступные бонусы</div>
        <div class="balance-val" id="bonus_val">0</div>
        <div class="progress-bar"><div class="fill" id="fill"></div></div>
        <div style="font-size: 12px; opacity: 0.5" id="next_rank">До SILVER: 0 тг</div>
    </div>

    <button class="btn-main" onclick="openQR()">ПОКАЗАТЬ QR</button>

    <div id="qrModal" onclick="closeQR()">
        <div id="qrcode"></div>
        <h2 id="id_display" style="margin-top: 20px;">000000</h2>
        <p style="opacity: 0.5">Покажите этот код продавцу</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = '#0f1216';
        tg.headerColor = '#0f1216';

        const p = new URLSearchParams(window.location.search);
        const cid = p.get('cid') || '000000';
        const bonuses = p.get('bonuses') || '0';
        const spent = parseFloat(p.get('spent') || '0');
        const rank = p.get('rank') || 'BRONZE';
        const fio = p.get('fio') || 'Клиент';

        document.getElementById('bonus_val').innerText = Math.floor(bonuses);
        document.getElementById('rank').innerText = rank;
        document.getElementById('fio_display').innerText = fio;
        document.getElementById('id_display').innerText = cid;

        let next = 400000;
        if (spent >= 1200000) next = 1200000;
        else if (spent >= 800000) next = 1200000;
        else if (spent >= 400000) next = 800000;

        document.getElementById('fill').style.width = Math.min((spent/next)*100, 100) + '%';
        document.getElementById('next_rank').innerText = `До следующего уровня: ${Math.max(0, next-spent).toLocaleString()} тг`;

        const qrData = `${cid}:${fio}:${Math.floor(bonuses)}:${spent}:${rank}`;

        // МАГИЯ ЗДЕСЬ: encodeURIComponent делает текст безопасным для QR кода
        new QRCode(document.getElementById("qrcode"), { 
            text: encodeURIComponent(qrData), 
            width: 250, 
            height: 250 
        });

        function openQR() { document.getElementById('qrModal').style.display = 'flex'; }
        function closeQR() { document.getElementById('qrModal').style.display = 'none'; }
    </script>
</body>
</html>
